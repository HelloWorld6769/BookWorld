<!DOCTYPE html>
<html>
<head>
  <title>BookVerse</title>
  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      text-align:center;
    }

    h1{
      margin-top:40px;
    }

    .books{
      display:flex;
      justify-content:center;
      gap:30px;
      margin-top:40px;
      flex-wrap:wrap;
    }

    .book{
      background:white;
      padding:15px;
      border-radius:10px;
      width:200px;
      box-shadow:0 5px 10px rgba(0,0,0,0.1);
    }

    .book img{
      width:100%;
      border-radius:10px;
    }

    .book a{
      display:block;
      margin-top:10px;
      background:#4a90e2;
      color:white;
      padding:8px;
      text-decoration:none;
      border-radius:5px;
    }
  </style>
</head>
<body>

<h1>📚 BookVerse</h1>
<p>Talk to your favorite characters</p>

<div class="books">

  <div class="book">
    <img src="https://www.gutenberg.org/cache/epub/1342/pg1342.cover.medium.jpg">
    <h3>Pride and Prejudice</h3>
    <a href="https://www.gutenberg.org/ebooks/1342" target="_blank">
      Read Online
    </a>
  </div>

  <div class="book">
    <img src="https://www.gutenberg.org/cache/epub/345/pg345.cover.medium.jpg">
    <h3>Dracula</h3>
    <a href="https://www.gutenberg.org/ebooks/345" target="_blank">
      Read Online
    </a>
  </div>

  <div class="book">
    <img src="https://www.gutenberg.org/cache/epub/1661/pg1661.cover.medium.jpg">
    <h3>Sherlock Holmes</h3>
    <a href="https://www.gutenberg.org/ebooks/1661" target="_blank">
      Read Online
    </a>
  </div>

</div>

</body>
</html>
